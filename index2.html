<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOKSKY</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="icon" href="C:\Users\ar076\OneDrive\Documents\python-workspace\cars3.png">
</head>
<body>
    <div class="navbar">
        <h1>BOOKSKY</h1>
    </div>
    <div class="container">
        <div class="book-container">
            <h2>RICH DAD POOR DAD</h2>
            <h5>Robert</h5>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Explicabo ipsam vel odit exercitationem facere cupiditate vitae repudiandae tenetur, ullam impedit quas reprehenderit dicta aliquam qui reiciendis voluptatibus voluptatem id sapiente!</p>
            <button onclick="deletebook(event)">Delete</button>
        </div>
    </div>
    <div class="popup-overlay"></div>
    <div class="popup-box">
        <h2>ADD BOOK</h2>
        <form>
            <input type="text" placeholder="BOOK TITLE" id="book-title-input">
            <input type="text" placeholder="BOOK AUTHOR" id="book-author-input">
            <textarea placeholder="SHORT DESCRIPTION" id="book-description-input"></textarea>
            <button id="add-book">ADD</button>
            <button id="cancel-popup">CANCEL</button>
        </form>
    </div>
    <button class="add-button" id="add-popup-button">+</button>
    <script src="script2.js"></script>
</body>
</html>
